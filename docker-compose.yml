services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feedback_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/feedback_tracker
      CORS_ORIGIN: http://localhost:8080
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data: